name: Daily TEAM Scrape → Supabase

on:
  schedule:
    - cron: '0 12 * * *'     # 7:00 AM ET every day (UTC-5)
  workflow_dispatch:         # Allows manual run

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run player scrapers (5 splits)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python scrape_no_splits.py
          python scrape_vs_r.py
          python scrape_vs_l.py
          python scrape_home.py
          python scrape_away.py

      - name: Run team scrapers — Full Year (5 splits)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python scrape_teams_no_splits_full_year.py
          python scrape_teams_vs_r_full_year.py
          python scrape_teams_vs_l_full_year.py
          python scrape_teams_home_full_year.py
          python scrape_teams_away_full_year.py

      - name: Run team scrapers — Last 30 Days (5 splits)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python scrape_teams_no_splits_last_30_days.py
          python scrape_teams_vs_r_last_30_days.py
          python scrape_teams_vs_l_last_30_days.py
          python scrape_teams_home_last_30_days.py
          python scrape_teams_away_last_30_days.py

      - name: Run team scrapers — Last 14 Days (5 splits)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python scrape_teams_no_splits_last_14_days.py
          python scrape_teams_vs_r_last_14_days.py
          python scrape_teams_vs_l_last_14_days.py
          python scrape_teams_home_last_14_days.py
          python scrape_teams_away_last_14_days.py

      - name: Run team scrapers — Last 7 Days (5 splits)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python scrape_teams_no_splits_last_7_days.py
          python scrape_teams_vs_r_last_7_days.py
          python scrape_teams_vs_l_last_7_days.py
          python scrape_teams_home_last_7_days.py
          python scrape_teams_away_last_7_days.py

      - name: Telegram — success
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="✅ FanGraphs TEAM STATS scrape complete! 5 player splits + 20 team splits (Full Year, Last 30/14/7 Days × 5 splits) uploaded to the Database successfully."

      - name: Telegram — failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="❌ FanGraphs scrape FAILED. Check the logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
