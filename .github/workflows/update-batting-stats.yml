name: Update 2026 Batting Stats to Supabase

on:
  schedule:
    - cron: '0 12 * * *'     # Runs every day at 8:00 AM New York time
  workflow_dispatch:         # Lets you run it manually anytime

jobs:
  update-stats:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pybaseball pandas supabase

      - name: Run script (pushes to Supabase)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python 2026_batting_table.py
