name: Daily Fangraphs Scrape → Supabase

on:
  schedule:
    - cron: '0 12 * * *'     # 8:00 AM EST every day
  workflow_dispatch:         # Allows manual run

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Run all 5 scrapers
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python scrape_no_splits.py
          python scrape_vs_r.py
          python scrape_vs_l.py
          python scrape_home.py
          python scrape_away.py
