name: Scrape Runs Per Game (TeamRankings)

on:
  schedule:
    # Daily at 14:00 UTC (10 AM EDT)
    - cron: '0 14 * * *'
  workflow_dispatch:

permissions:
  contents: write   # lets the built-in GITHUB_TOKEN update _RPG.csv

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install pandas requests lxml

      - name: Run scraper
        env:
          GITHUB_TOKEN:     ${{ secrets.GITHUB_TOKEN }}
          SUPABASE_URL:     ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:     ${{ secrets.SUPABASE_KEY }}
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scrape_rpg.py
