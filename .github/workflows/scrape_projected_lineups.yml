name: Scrape Projected Lineups

on:
  schedule:
    # Every 30 min from 15:00–00:00 UTC (11 AM–8 PM ET / EDT)
    # Covers EDT (UTC-4) and EST (UTC-5) year-round.
    # The Python script enforces the exact 11 AM–8 PM ET window itself.
    - cron: '0,30 15-23 * * *'
    - cron: '0,30 0 * * *'
  workflow_dispatch:  # allow manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install \
            playwright \
            beautifulsoup4 \
            lxml \
            pytz \
            supabase

      - name: Install Playwright Chromium
        run: playwright install chromium --with-deps

      - name: Run scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scrape_projected_lineups.py
