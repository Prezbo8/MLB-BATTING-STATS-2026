name: Teams — Away

on:
  schedule:
    - cron: '40 11 * * *'   # 6:40 AM ET (UTC-5)
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scrape Away — All Date Ranges
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python scrape_teams_away_full_year.py
          python scrape_teams_away_last_30_days.py
          python scrape_teams_away_last_14_days.py
          python scrape_teams_away_last_7_days.py

      - name: Telegram — success
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="✅ Teams Away scraped successfully (Full Year, Last 30/14/7 Days)"

      - name: Telegram — failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="❌ Teams Away scrape FAILED. Logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
