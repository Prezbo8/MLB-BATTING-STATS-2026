name: MLB Pitcher Pipeline

# Runs the two pitcher chains in order (before the team scraper at 13:00 UTC):
#   Chain A (overalls): career scraper -> 2026 scraper -> merger -> scorer
#   Chain B (splits):   splits 2026 -> splits career -> merger -> scorer
# Within a chain, a failure stops the rest of that chain (so partial data is
# never merged/scored). Chain B still runs if Chain A failed.

on:
  schedule:
    # Daily at 10:00 UTC (6 AM ET)
    - cron: '0 10 * * *'
  workflow_dispatch:

permissions:
  contents: write   # built-in GITHUB_TOKEN pushes CSVs via the contents API

env:
  GITHUB_TOKEN:     ${{ secrets.GITHUB_TOKEN }}
  SUPABASE_URL:     ${{ secrets.SUPABASE_URL }}
  SUPABASE_KEY:     ${{ secrets.SUPABASE_KEY }}
  TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install pandas numpy requests supabase

      # ── Chain A: pitcher overalls ────────────────────────────────────
      - name: Scrape pitcher career stats (2017-2026)
        run: python scrape_pitcher_career.py

      - name: Scrape pitcher 2026 stats
        run: python scrape_pitcher_2026.py

      - name: Merge pitcher overall data
        run: |
          cp pitcher/historical/*.csv pitcher_data/
          python merge_pitcher_overall.py

      - name: Score pitcher overall data
        run: python score_pitcher_overall.py

      # ── Chain B: pitcher splits (runs even if Chain A failed) ───────
      - name: Scrape pitcher splits 2026
        id: splits2026
        if: success() || failure()
        run: python scrape_pitcher_splits_2026.py

      - name: Scrape pitcher splits career
        id: splitscareer
        if: steps.splits2026.conclusion == 'success'
        run: python scrape_pitcher_splits_career.py

      - name: Merge pitcher splits
        id: splitsmerge
        if: steps.splitscareer.conclusion == 'success'
        run: python merge_pitcher_splits.py

      - name: Score pitcher splits
        if: steps.splitsmerge.conclusion == 'success'
        run: python score_pitcher_splits.py
